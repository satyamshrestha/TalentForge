services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: database123
      POSTGRES_DB: talentforge
    ports:
      - "5432:5432"

    volumes:
    - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      - db

  redis:
    image: redis:latest

    ports:
      - "6379:6379"

  celery_worker:
    build: .

    command: celery -A celery_app.celery worker --loglevel=info
    
    volumes:
      - .:/app

    depends_on:
      - db
      - redis
      
volumes:
  postgres_data:
  pgadmin_data: